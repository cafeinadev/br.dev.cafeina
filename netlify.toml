# Build command and publish dir are set per-site in Netlify, since this repo
# serves two sites: cafeinadev (main app) and the design-system app.
[build.environment]
  NODE_VERSION = "22"

# The design system moved to its own site (design-system.cafeina.dev.br).
# Send the retired /design-system path back to the home page.
[[redirects]]
  from = "/design-system"
  to = "https://cafeina.dev.br/"
  status = 301
  force = true

[[redirects]]
  from = "/design-system/*"
  to = "https://cafeina.dev.br/"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/brand/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
