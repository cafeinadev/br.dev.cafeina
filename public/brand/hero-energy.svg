<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 900" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="energy-1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fdda0d" stop-opacity="0"/>
      <stop offset="0.35" stop-color="#fdda0d" stop-opacity="0.85"/>
      <stop offset="0.7" stop-color="#fdda0d" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#fdda0d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="energy-2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fdda0d" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#fdda0d" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#fdda0d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="energy-3" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#ffe97a" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#ffe97a" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffe97a" stop-opacity="0"/>
    </linearGradient>
    <filter id="energy-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#energy-glow)">
    <path
      d="M40,820 C 180,720 80,520 260,440 C 440,360 320,220 540,140 C 640,100 690,60 700,40"
      stroke="url(#energy-1)"
      stroke-width="2.4"
      stroke-linecap="round"
    />
    <path
      d="M20,860 C 200,760 60,560 320,500 C 580,440 380,300 660,210"
      stroke="url(#energy-2)"
      stroke-width="1.6"
      stroke-linecap="round"
      opacity="0.7"
    />
    <path
      d="M80,780 C 220,680 100,480 340,420 C 580,360 460,260 620,180"
      stroke="url(#energy-3)"
      stroke-width="3"
      stroke-linecap="round"
      opacity="0.55"
    />
    <path
      d="M60,720 C 140,640 240,560 280,460 C 320,360 540,280 600,200"
      stroke="url(#energy-1)"
      stroke-width="1"
      stroke-linecap="round"
      opacity="0.6"
    />
    <path
      d="M120,820 C 240,720 180,560 380,460 C 580,360 420,260 680,160"
      stroke="url(#energy-2)"
      stroke-width="1.2"
      stroke-linecap="round"
      opacity="0.4"
    />
  </g>
</svg>
